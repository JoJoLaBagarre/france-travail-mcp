name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          cache: npm
      # `npm ci` déclenche le script "prepare" => compilation (tsc).
      - run: npm ci
      # Vérification de types explicite.
      - run: npm test
