name: Publish (npm + MCP Registry)

# Déclenché par un tag de version, ex. : git tag v0.1.1 && git push origin v0.1.1
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC : provenance npm + authentification au registre MCP
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm test
      - run: npm run build

      # 1) Publier le paquet sur npm (requiert le secret NPM_TOKEN dans le dépôt).
      # Tolérant : si la version est déjà publiée (ex. premier publish manuel) ou si
      # le token manque, on n'échoue pas et on continue vers le registre MCP — qui
      # validera de toute façon que le paquet@version existe bien sur npm.
      - name: Publier sur npm
        continue-on-error: true
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 2) Publier les métadonnées sur le registre MCP officiel.
      - name: Installer mcp-publisher
        run: curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      # Aligne la version de server.json sur le tag (le registre exige que la
      # version du paquet déclaré corresponde à celle publiée sur npm).
      - name: Synchroniser la version de server.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version=$v | .packages[0].version=$v' server.json > server.tmp && mv server.tmp server.json

      - name: Authentification au registre MCP (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publier sur le registre MCP
        run: ./mcp-publisher publish
